stages:
  - test
  - build

# 需要一个带 macos 标签的 GitLab Runner
# 在 Runner 机器上执行：gitlab-runner register，tags 填 macos

test:
  stage: test
  tags:
    - macos
  script:
    - cd src-swift
    - swift run MurmurTests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build-release:
  stage: build
  tags:
    - macos
  script:
    - cd src-swift
    - swift build -c release
    - mkdir -p dist/murmur.app/Contents/MacOS
    - mkdir -p dist/murmur.app/Contents/Resources
    - cp .build/release/murmur dist/murmur.app/Contents/MacOS/
    - cp Info.plist dist/murmur.app/Contents/
    - codesign --force -s - --entitlements murmur.entitlements dist/murmur.app
  artifacts:
    name: "murmur-$CI_COMMIT_SHORT_SHA"
    paths:
      - src-swift/dist/murmur.app
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
